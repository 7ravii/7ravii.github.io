site_name: Ravindra Singh
site_description: Spatial Justice Researcher | Urban Green Infrastructure | Delhi
site_author: Ravindra Singh
site_url: https://7ravii.github.io

theme:
  name: material
  icon:
    logo: material/earth
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "© 2026 Ravindra Singh"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/7ravii
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ravindra-singh-304b3313a/
    - icon: material/email
      link: mailto:01ravindrasingh@gmail.com

plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Research: research.md
  - Projects:
    - Overview: projects/index.md
    - "Who Gets to Stay Cool?": projects/cooling-deficit.md
    - "Caste, Space, and Green": projects/caste-green.md
    - "Dilli Dehat Project": projects/dilli-dehat.md
  - Publications: publications.md
  - Experience: experience.md
  - Contact: contact.md